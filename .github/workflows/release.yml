name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Install web dependencies
        run: npm install --prefix web

      - name: Build frontend
        run: npm run build

      - name: Build & publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: ./node_modules/.bin/electron-builder --${{ matrix.platform }} --publish always
